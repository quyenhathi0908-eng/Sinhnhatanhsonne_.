<!<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Sinh nhật Hồng Sơn 🎂</title>

<style>
html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  background:black;
  overflow:hidden;
  font-family: "Segoe UI", sans-serif;
}

/* ===== SAO RANDOM ===== */
.star{
  position:fixed;
  color:white;
  animation: twinkle 2s infinite alternate;
}
@keyframes twinkle{
  from{opacity:0.2}
  to{opacity:1}
}

/* ===== PARTICLE PHÁO ===== */
.particle{
  position:fixed;
  width:4px;
  height:4px;
  border-radius:50%;
  pointer-events:none;
}

/* ===== CHỮ BAY ===== */
.text{
  position:fixed;
  bottom:-60px;
  font-size:26px;
  font-weight:bold;
  color:#ff9ad5;
  text-shadow:0 0 10px #ff69b4, 0 0 20px #c77dff;
  animation: flyUp 18s linear forwards;
}
@keyframes flyUp{
  from{transform:translateY(0); opacity:0}
  10%{opacity:1}
  to{transform:translateY(-120vh); opacity:0}
}

/* ===== BÁNH ===== */
#cake{
  position:fixed;
  bottom:90px;
  left:50%;
  transform:translateX(-50%);
  text-align:center;
  font-size:42px;
  z-index:5;
}
#candle{
  cursor:pointer;
  animation: flame .6s infinite alternate;
}
@keyframes flame{
  from{transform:scale(1)}
  to{transform:scale(1.15)}
}

/* ===== NÚT NHẠC ===== */
#playMusic{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  padding:12px 22px;
  background:linear-gradient(45deg,#ff69b4,#c77dff);
  color:white;
  border:none;
  border-radius:25px;
}
</style>
</head>

<body>

<div id="cake">
  🎂
  <div id="candle" onclick="blow()">🕯️</div>
  <p>Thổi nến đi Hồng Sơn ✨</p>
</div>

<button id="playMusic">🎵 Bật nhạc</button>
<audio id="bgMusic" loop>
  <source src="nhac.mp3" type="audio/mpeg">
</audio>

<script>
/* ===== NHẠC ===== */
playMusic.onclick = ()=>{
  bgMusic.play();
  playMusic.style.display="none";
}

/* ===== THỔI NẾN ===== */
function blow(){
  candle.innerHTML="💨";
  alert("🎉 Chúc mừng sinh nhật Hồng Sơn 🎉");
}

/* ===== SAO RANDOM ===== */
setInterval(()=>{
  const s=document.createElement("div");
  s.className="star";
  s.innerHTML="✦";
  s.style.left=Math.random()*100+"vw";
  s.style.top=Math.random()*100+"vh";
  s.style.fontSize=(Math.random()*8+6)+"px";
  document.body.appendChild(s);
  setTimeout(()=>s.remove(),2000);
},200);

/* ===== CHỮ BAY ===== */
const messages=[
"🎂 Sinh nhật vui vẻ Hồng Sơn",
"💖 Chúc Hồng Sơn luôn hạnh phúc",
"✨ Tuổi mới nhiều niềm vui",
"🌸 Luôn bình an",
"💫 May mắn đến với Sơn",
"🌷 Dịu dàng và an yên",
"💪 Luôn khoẻ mạnh",
"🎉 Một năm tuyệt vời"
];

setInterval(()=>{
  const t=document.createElement("div");
  t.className="text";
  t.innerText=messages[Math.random()*messages.length|0];
  t.style.left=Math.random()*80+"vw";
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),18000);
},3000);

/* ===== PHÁO BAY LÊN ===== */
function launchFirework(){
  const startX=Math.random()*window.innerWidth;
  const rocket=document.createElement("div");

  rocket.style.position="fixed";
  rocket.style.left=startX+"px";
  rocket.style.bottom="0px";
  rocket.style.width="3px";
  rocket.style.height="10px";
  rocket.style.background="white";

  document.body.appendChild(rocket);

  const targetY=Math.random()*window.innerHeight*0.6;

  rocket.animate([
    {transform:"translateY(0)"},
    {transform:`translateY(-${window.innerHeight-targetY}px)`}
  ],{duration:1000,easing:"ease-out"});

  setTimeout(()=>{
    rocket.remove();
    explode(startX,targetY);
  },1000);
}

/* ===== NỔ PHÁO ===== */
function explode(x,y){
  const colors=["#ff4d6d","#ffd166","#7b2cbf","#00f5d4","#ff9f1c"];

  for(let i=0;i<40;i++){
    const p=document.createElement("div");
    p.className="particle";

    const angle=Math.random()*2*Math.PI;
    const dist=Math.random()*100+50;

    const dx=Math.cos(angle)*dist;
    const dy=Math.sin(angle)*dist;

    p.style.left=x+"px";
    p.style.top=y+"px";
    p.style.background=colors[Math.random()*colors.length|0];

    document.body.appendChild(p);

    p.animate([
      {transform:"translate(0,0)",opacity:1},
      {transform:`translate(${dx}px,${dy}px)`,opacity:0}
    ],{duration:1200,easing:"ease-out"});

    setTimeout(()=>p.remove(),1200);
  }

  heartFirework(x,y);
  textFirework(x,y);
}

/* ===== PHÁO HÌNH TIM ===== */
function heartFirework(x,y){
  for(let t=0;t<Math.PI*2;t+=0.2){
    const p=document.createElement("div");
    p.className="particle";

    const dx=16*Math.pow(Math.sin(t),3)*8;
    const dy=-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))*8;

    p.style.left=x+"px";
    p.style.top=y+"px";
    p.style.background="pink";

    document.body.appendChild(p);

    p.animate([
      {transform:"translate(0,0)",opacity:1},
      {transform:`translate(${dx}px,${dy}px)`,opacity:0}
    ],{duration:1500});

    setTimeout(()=>p.remove(),1500);
  }
}

/* ===== PHÁO CHỮ SƠN ===== */
function textFirework(x,y){
  const text="SƠN";
  for(let i=0;i<text.length;i++){
    const p=document.createElement("div");
    p.style.position="fixed";
    p.style.left=x+"px";
    p.style.top=y+"px";
    p.style.color="white";
    p.style.fontWeight="bold";
    p.innerText=text[i];

    document.body.appendChild(p);

    p.animate([
      {transform:"translate(0,0)",opacity:1},
      {transform:`translate(${i*20-20}px,${-i*20}px)`,opacity:0}
    ],{duration:1500});

    setTimeout(()=>p.remove(),1500);
  }
}

/* ===== LOOP PHÁO ===== */
setInterval(()=>{
  launchFirework();
},1200);

</script>

</body>
</html>
